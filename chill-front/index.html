    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              gray: {
                850: '#1f2937',
                925: '#111827',
                975: '#030712'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
              'bounce-slow': 'bounce 2s infinite',
              'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
              'float': 'float 3s ease-in-out infinite'
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              pulseGlow: {
                '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                '50%': { opacity: '1', transform: 'scale(1.05)' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-5px)' }
              }
            },
            backdropBlur: {
              'xs': '2px'
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0b0f19;
        color: #e5e7eb;
      }
      /* Custom scrollbar for Webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4b5563;
      }
      
      /* Animación de slide de izquierda a derecha */
      @keyframes slideInFromLeft {
        0% {
          transform: translateX(-100%);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes slideInFromRight {
        0% {
          transform: translateX(100%);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      /* Animación de float continuo */
      @keyframes floatLeftRight {
        0%, 100% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(20px);
        }
      }
      
      /* Animación de bounce para el botón */
      @keyframes bounceIn {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      
      /* Animación de caída del botón desde el personaje */
      @keyframes dropFromCharacter {
        0% {
          position: fixed;
          bottom: 20vh;
          left: 50%;
          transform: translateX(-50%) scale(0.5) rotate(0deg);
          opacity: 0;
          filter: blur(3px);
        }
        5% {
          position: fixed;
          bottom: 20vh;
          left: 50%;
          transform: translateX(-50%) scale(0.7) rotate(-5deg);
          opacity: 1;
          filter: blur(2px);
        }
        50% {
          position: fixed;
          bottom: 10vh;
          left: 50%;
          transform: translateX(-50%) scale(0.9) rotate(-2deg);
          filter: blur(1px);
        }
        75% {
          position: fixed;
          bottom: 5vh;
          left: 50%;
          transform: translateX(-50%) scale(1.0) rotate(0deg);
          filter: blur(0px);
        }
        95% {
          position: fixed;
          bottom: 0vh;
          left: 50%;
          transform: translateX(-50%) scale(1.1) rotate(0deg);
          filter: blur(0px);
        }
        100% {
          position: relative;
          bottom: auto;
          left: auto;
          transform: translateX(0) translateY(0) scale(1) rotate(0deg);
          opacity: 1;
          filter: blur(0px);
        }
      }
      
      /* Animación fade-in suave */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      /* Animación de pulse suave */
      @keyframes softPulse {
        0%, 100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.02);
        }
      }
      
      /* Glow effect */
      @keyframes glow {
        0%, 100% {
          box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        50% {
          box-shadow: 0 0 30px rgba(99, 102, 241, 0.6);
        }
      }
      
      .animate-slide-in-left {
        animation: slideInFromLeft 0.5s ease-out;
      }
      
      .animate-slide-in-right {
        animation: slideInFromRight 0.5s ease-out;
      }
      
      .animate-float-lr {
        animation: floatLeftRight 3s ease-in-out infinite;
      }
      
      .animate-bounce-in {
        animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }
      
      .animate-drop-from-character {
        animation: dropFromCharacter 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      
      .animate-fade-in {
        animation: fadeIn 0.6s ease-out;
      }
      
      .animate-soft-pulse {
        animation: softPulse 2s ease-in-out infinite;
      }
      
      .animate-glow {
        animation: glow 2s ease-in-out infinite;
      }
      
      /* Smooth scroll behavior */
      html {
        scroll-behavior: smooth;
      }
      
      /* Transiciones suaves en hover */
      * {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
    </style>
</head>
